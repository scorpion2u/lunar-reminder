<body>
<div class="container">
    <div class="header">
        <h1>🌙 农历提醒</h1>
        <div class="menu-btn" id="menuBtn">☰</div>
    </div>
    
    <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" id="addCustomReminder">➕ 添加自定义提醒</div>
        <div class="menu-item" id="manageReminders">📋 管理自定义提醒</div>
        <div class="menu-item" id="requestPermission">🔔 开启通知</div>
    </div>
    
    <div id="permissionNote" class="permission-note" style="display: none;">
        <span>🔕 通知未开启，收不到提醒</span>
        <button id="enableNotification">开启</button>
    </div>
    
    <div class="month-nav">
        <button class="nav-btn" id="prevMonth">←</button>
        <span id="currentMonthYear">2026年3月</span>
        <button class="nav-btn" id="nextMonth">→</button>
    </div>
    
    <div class="default-reminder-toggle" id="defaultReminderContainer">
        <div class="toggle-label">
            <span>🍎</span>
            <div>
                初一十五买水果
                <div class="reminder-note">提前3天提醒</div>
            </div>
        </div>
        <div class="toggle-switch active" id="defaultReminderToggle"></div>
    </div>
    
    <div class="weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    
    <table class="calendar" id="calendar"></table>
    
    <div class="reminder-section">
        <div class="section-title">
            <span>📢 即将提醒</span>
            <span style="font-size:0.8rem; color:#aa8c78;" id="reminderCount"></span>
        </div>
        
        <ul class="reminder-list" id="reminderList">
            <li class="empty-reminder">加载中...</li>
        </ul>
        
        <div class="add-btn" id="showAddReminder">
            + 添加自定义提醒
        </div>
    </div>
</div>

<!-- 添加自定义提醒模态框 -->
<div id="addReminderModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>添加提醒</h3>
            <button class="close-btn" id="closeAddModal">&times;</button>
        </div>
        
        <div class="form-group">
            <label>提醒类型</label>
            <div class="radio-group">
                <label><input type="radio" name="reminderType" value="lunar" checked> 农历</label>
                <label><input type="radio" name="reminderType" value="solar"> 公历</label>
            </div>
        </div>
        
        <div class="form-group" id="lunarMonthGroup">
            <label>农历月份</label>
            <select id="lunarMonth">
                <option value="1">正月</option>
                <option value="2">二月</option>
                <option value="3">三月</option>
                <option value="4">四月</option>
                <option value="5">五月</option>
                <option value="6">六月</option>
                <option value="7">七月</option>
                <option value="8">八月</option>
                <option value="9">九月</option>
                <option value="10">十月</option>
                <option value="11">冬月</option>
                <option value="12">腊月</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>日期</label>
            <input type="number" id="reminderDay" placeholder="例如：15" min="1" max="30" value="15">
        </div>
        
        <div class="form-group">
            <label>是否闰月</label>
            <label><input type="checkbox" id="isLeap"> 闰月</label>
        </div>
        
        <div class="form-group" id="solarGroup" style="display: none;">
            <label>公历日期</label>
            <input type="date" id="solarDate">
        </div>
        
        <div class="form-group">
            <label>提醒内容</label>
            <input type="text" id="reminderTitle" placeholder="例如：买水果" value="买水果">
        </div>
        
        <div class="form-group">
            <label>提前几天提醒</label>
            <input type="number" id="daysBefore" min="0" max="30" value="3">
        </div>
        
        <div class="form-group">
            <label>重复</label>
            <select id="repeatType">
                <option value="monthly">每月</option>
                <option value="yearly">每年</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button class="btn btn-secondary" id="cancelAdd">取消</button>
            <button class="btn btn-primary" id="saveReminder">保存</button>
        </div>
    </div>
</div>

<!-- 管理自定义提醒模态框 -->
<div id="manageRemindersModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>自定义提醒</h3>
            <button class="close-btn" id="closeManageModal">&times;</button>
        </div>
        
        <div id="customRemindersList" class="custom-reminders">
            <!-- 动态加载 -->
        </div>
        
        <div class="form-actions">
            <button class="btn btn-secondary" id="closeManage">关闭</button>
        </div>
    </div>
</div>

        solarToLunar: function(year, month, day) {
            let lunar = this.getLunarDate(year, month, day);
            
            return {
                lunarYear: lunar.year,
                lunarMonth: lunar.month,
                lunarDay: lunar.day,
                lunarMonthName: this.monthNames[lunar.month - 1],
                lunarDayName: this.dayNames[lunar.day - 1],
                isLeap: lunar.isLeap,
                term: ''
            };
        },
        
        getLunarDate: function(year, month, day) {
            let offset = (Date.UTC(year, month - 1, day) - Date.UTC(1900, 0, 31)) / 86400000;
            
            let lunarYear = 1900;
            let yearDays = 0;
            
            for (let i = 0; i < this.lunarInfo.length && lunarYear < 2100; i++) {
                yearDays = this.getLunarYearDays(lunarYear);
                if (offset < yearDays) break;
                offset -= yearDays;
                lunarYear++;
            }
            
            let leapMonth = this.getLeapMonth(lunarYear);
            let isLeap = false;
            let lunarMonth = 1;
            let monthDays = 0;
            
            for (let i = 1; i <= 12; i++) {
                if (leapMonth > 0 && i == leapMonth + 1 && !isLeap) {
                    monthDays = this.getLeapMonthDays(lunarYear);

                    monthDays = this.getLunarMonthDays(lunarYear, i);
                }
                
                if (offset < monthDays) break;
                offset -= monthDays;
                
                if (leapMonth > 0 && i == leapMonth && isLeap) {
                    isLeap = false;
                }
                
                lunarMonth++;
            }
            
            return {
                year: lunarYear,
                month: lunarMonth,
                day: offset + 1,
                isLeap: isLeap
            };
        },
        
        getLunarYearDays: function(year) {
            let sum = 348;
            for (let i = 0x8000; i > 0x8; i >>= 1) {
                sum += (this.lunarInfo[year - 1900] & i) ? 1 : 0;
            }
            return sum + this.getLeapMonthDays(year);
        },
        
        getLunarMonthDays: function(year, month) {
            return (this.lunarInfo[year - 1900] & (0x10000 >> month)) ? 30 : 29;
        },
        
        getLeapMonth: function(year) {
            return this.lunarInfo[year - 1900] & 0xf;
        },
        
        getLeapMonthDays: function(year) {
            let leapMonth = this.getLeapMonth(year);
            if (leapMonth) {
                return (this.lunarInfo[year - 1900] & 0x10000) ? 30 : 29;
            }
            return 0;
        }
    };
    
    // ==================== 应用主逻辑 ====================
    const App = {
        state: {
            currentYear: new Date().getFullYear(),
            currentMonth: new Date().getMonth(),
            today: new Date(),
            customReminders: [],
            defaultReminderEnabled: true,
            notificationPermission: false
        },
        
        dom: {},
        
        init: function() {
            this.cacheDOM();
            this.loadData();
            this.checkNotificationPermission();
            this.renderCalendar();
            this.updateReminders();
            this.bindEvents();
            this.updateDefaultReminderToggle();
        },
        
        cacheDOM: function() {
            const ids = ['calendar', 'currentMonthYear', 'prevMonth', 'nextMonth', 
                        'reminderList', 'reminderCount', 'menuBtn', 'menuDropdown',
                        'addCustomReminder', 'manageReminders', 'requestPermission',
                        'permissionNote', 'enableNotification', 'showAddReminder',
                        'addReminderModal', 'closeAddModal', 'cancelAdd', 'saveReminder',
                        'manageRemindersModal', 'closeManageModal', 'closeManage',
                        'customRemindersList', 'defaultReminderToggle', 'defaultReminderContainer'];
            
            ids.forEach(id => {
                this.dom[id] = document.getElementById(id);
            });
            
            this.dom.reminderType = document.getElementsByName('reminderType');
            this.dom.lunarMonth = document.getElementById('lunarMonth');
            this.dom.reminderDay = document.getElementById('reminderDay');
            this.dom.isLeap = document.getElementById('isLeap');
            this.dom.solarDate = document.getElementById('solarDate');
            this.dom.reminderTitle = document.getElementById('reminderTitle');
            this.dom.daysBefore = document.getElementById('daysBefore');
            this.dom.repeatType = document.getElementById('repeatType');
            this.dom.lunarMonthGroup = document.getElementById('lunarMonthGroup');
            this.dom.solarGroup = document.getElementById('solarGroup');
        },
        
        loadData: function() {
            try {
                const saved = localStorage.getItem('lunar_reminders_v5');
                if (saved) {
                    this.state.customReminders = JSON.parse(saved);
                }
                
                const defaultEnabled = localStorage.getItem('default_reminder_enabled_v5');
                if (defaultEnabled !== null) {
                    this.state.defaultReminderEnabled = defaultEnabled === 'true';
                }
            } catch (e) {
                console.error('加载数据失败', e);
            }
        },
        
        saveData: function() {
            localStorage.setItem('lunar_reminders_v5', JSON.stringify(this.state.customReminders));
            localStorage.setItem('default_reminder_enabled_v5', this.state.defaultReminderEnabled);
        },
        
        getLunarDate: function(date) {
            try {
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                
                const lunar = LunarCalendar.solarToLunar(year, month, day);
                
                return {
                    lunarYear: lunar.lunarYear,
                    lunarMonth: lunar.lunarMonth,
                    lunarDay: lunar.lunarDay,
                    lunarMonthName: lunar.lunarMonthName,
                    lunarDayName: lunar.lunarDayName,
                    isLeap: lunar.isLeap,
                    isNewMoon: lunar.lunarDay === 1,
                    isFullMoon: lunar.lunarDay === 15
                };
            } catch (e) {
                console.error('农历转换失败', e);
                return {
                    lunarDay: date.getDate(),
                    lunarDayName: '??',
                    lunarMonthName: '??',
                    isLeap: false,
                    isNewMoon: false,
                    isFullMoon: false
                };
            }
        },
        
        checkNotificationPermission: function() {
            if (!('Notification' in window)) {
                this.dom.permissionNote.style.display = 'none';
                return;
            }
            
            this.state.notificationPermission = Notification.permission === 'granted';
            
            if (Notification.permission === 'default') {
                this.dom.permissionNote.style.display = 'flex';
            } else if (Notification.permission === 'denied') {
                this.dom.permissionNote.style.display = 'flex';
                this.dom.permissionNote.querySelector('span').textContent = '🔕 通知已被拒绝';
                this.dom.enableNotification.style.display = 'none';
            } else {
                this.dom.permissionNote.style.display = 'none';
            }
        },
        
        requestNotificationPermission: function() {
            if (!('Notification' in window)) {
                this.showToast('浏览器不支持通知');
                return;
            }
            
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    this.dom.permissionNote.style.display = 'none';
                    this.state.notificationPermission = true;
                    this.showToast('✓ 通知已开启');
                }
            });
        },
        
        updateDefaultReminderToggle: function() {
            const toggle = this.dom.defaultReminderToggle;
            if (this.state.defaultReminderEnabled) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
        },
        
        toggleDefaultReminder: function() {
            this.state.defaultReminderEnabled = !this.state.defaultReminderEnabled;
            this.saveData();
            this.updateDefaultReminderToggle();
            this.renderCalendar();
            this.updateReminders();
            this.showToast(this.state.defaultReminderEnabled ? '初一十五提醒已开启' : '初一十五提醒已关闭');
        },
        
        renderCalendar: function() {
            const { currentYear, currentMonth } = this.state;
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            
            this.dom.currentMonthYear.textContent = `${currentYear}年 ${currentMonth + 1}月`;
            
            let html = '';
            let date = 1;
            
            let startCol = firstDay.getDay() - 1;
            if (startCol < 0) startCol = 6;
            
            for (let row = 0; row < 6; row++) {
                html += '<tr>';
                
                for (let col = 0; col < 7; col++) {
                    if (row === 0 && col < startCol) {
                        html += '<td class="empty-cell"></td>';
                    } else if (date > lastDay.getDate()) {
                        html += '<td class="empty-cell"></td>';
                    } else {
                        const currentDate = new Date(currentYear, currentMonth, date);
                        const lunar = this.getLunarDate(currentDate);
                        
                        const hasReminder = this.checkDateHasReminder(currentDate, lunar);
                        
                        const isToday = currentDate.getDate() === this.state.today.getDate() &&
                                       currentDate.getMonth() === this.state.today.getMonth() &&
                                       currentDate.getFullYear() === this.state.today.getFullYear();
                        
                        let tdClass = '';
                        if (isToday) tdClass += 'today ';
                        if (hasReminder) tdClass += 'has-reminder';
                        
                        html += `<td class="${tdClass}">`;
                        html += `<div class="solar-date">${date}</div>`;
                        html += `<div class="lunar-date">${lunar.lunarDayName}</div>`;
                        if (hasReminder) {
                            html += `<div class="reminder-badge"></div>`;
                        }
                        html += '</td>';
                        
                        date++;
                    }
                }
                
                html += '</tr>';
                
                if (date > lastDay.getDate()) break;
            }
            
            this.dom.calendar.innerHTML = html;
        },
        
        checkDateHasReminder: function(date, lunar) {
            if (this.state.defaultReminderEnabled && (lunar.lunarDay === 1 || lunar.lunarDay === 15)) {
                return true;
            }
            
            return this.state.customReminders.some(reminder => {
                return this.matchReminder(reminder, date, lunar);
            });
        },
        
        matchReminder: function(reminder, date, lunar) {
            if (reminder.type === 'lunar') {
                const matchMonth = reminder.lunarMonth === lunar.lunarMonth;
                const matchDay = reminder.lunarDay === lunar.lunarDay;
                const matchLeap = reminder.isLeap === lunar.isLeap;
                
                if (reminder.repeat === 'monthly') {
                    return matchDay;
                } else {
                    return matchMonth && matchDay && matchLeap;
                }
            } else {
                const month = date.getMonth() + 1;
                const day = date.getDate();
                
                if (reminder.repeat === 'monthly') {
                    return reminder.solarDay === day;
                } else {
                    return reminder.solarMonth === month && reminder.solarDay === day;
                }
            }
        },
        
        // ========== 修改后的提醒逻辑 ==========
        updateReminders: function() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const reminders = [];
            
            // 检查未来30天
            for (let i = 0; i <= 30; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + i);
                
                const lunar = this.getLunarDate(checkDate);
                
                // 默认初一十五提醒
                if (this.state.defaultReminderEnabled && (lunar.lunarDay === 1 || lunar.lunarDay === 15)) {
                    // 生成3条提醒：当天、前一天、前两天
                    for (let daysBefore = 0; daysBefore <= 2; daysBefore++) {
                        const reminderDate = new Date(checkDate);
                        reminderDate.setDate(checkDate.getDate() - daysBefore);
                        reminderDate.setHours(0, 0, 0, 0);
                        
                        // 只提醒今天及未来的日子
                        if (reminderDate >= today) {
                            const daysUntil = i - daysBefore;
                            
                            // 根据提前天数设置不同文案
                            let title = '';
                            if (daysBefore === 0) {
                                // 当天
                                title = lunar.lunarDay === 1 ? '🙏 今天初一 · 供水果上香' : '🙏 今天十五 · 供水果上香';
                            } else if (daysBefore === 1) {
                                // 前一天
                                title = lunar.lunarDay === 1 ? '⏰ 明天初一 · 记得买水果' : '⏰ 明天十五 · 记得买水果';
                            } else {
                                // 前两天
                                title = lunar.lunarDay === 1 ? '📅 后天初一 · 记得买水果' : '📅 后天十五 · 记得买水果';
                            }
                            
                            reminders.push({
                                date: new Date(reminderDate),
                                targetDate: new Date(checkDate),
                                lunarDay: lunar.lunarDayName,
                                lunarMonth: lunar.lunarMonthName,
                                title: title,
                                daysUntil: daysUntil,
                                daysBefore: daysBefore,
                                type: '初一十五'
                            });
                        }
                    }
                }
                
                // 检查自定义提醒
                this.state.customReminders.forEach(reminder => {
                    if (this.matchReminder(reminder, checkDate, lunar)) {
                        // 自定义提醒也支持连续提醒
                        for (let daysBefore = 0; daysBefore <= reminder.daysBefore; daysBefore++) {
                            const reminderDate = new Date(checkDate);
                            reminderDate.setDate(checkDate.getDate() - daysBefore);
                            reminderDate.setHours(0, 0, 0, 0);
                            
                            if (reminderDate >= today) {
                                const daysUntil = i - daysBefore;
                                
                                let title = reminder.title;
                                if (daysBefore === 0) {
                                    title = `✨ 今天 · ${reminder.title}`;
                                } else if (daysBefore === 1) {
                                    title = `⏰ 明天 · ${reminder.title}`;
                                } else {
                                    title = `📅 ${daysBefore}天后 · ${reminder.title}`;
                                }
                                
                                reminders.push({
                                    date: new Date(reminderDate),
                                    targetDate: new Date(checkDate),
                                    lunarDay: lunar.lunarDayName,
                                    lunarMonth: lunar.lunarMonthName,
                                    title: title,
                                    daysUntil: daysUntil,
                                    daysBefore: daysBefore,
                                    type: 'custom'
                                });
                            }
                        }
                    }
                });
            }
            
            // 按日期排序
            reminders.sort((a, b) => a.date - b.date);
            
            // 去重
            const unique = [];
            const seen = new Set();
            reminders.forEach(r => {
                const key = `${r.date.toDateString()}-${r.title}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push(r);
                }
            });
            
            // 只显示未来7天
            const upcomingReminders = unique.filter(r => r.daysUntil >= 0 && r.daysUntil <= 7);
            this.renderReminderList(upcomingReminders);
            
            // 检查通知
            this.checkAndNotify(reminders);
        },
        
        checkAndNotify: function(reminders) {
            if (!this.state.notificationPermission) return;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = today.toDateString();
            
            // 获取今天的提醒
            const todayReminders = reminders.filter(r => {
                const reminderDate = new Date(r.date);
                reminderDate.setHours(0, 0, 0, 0);
                return reminderDate.toDateString() === todayStr;
            });
            
            if (todayReminders.length === 0) return;
            
            // 避免重复通知
            const notifiedKey = `notified_${todayStr}`;
            if (localStorage.getItem(notifiedKey)) return;
            
            // 组合文案
            const fruitReminders = todayReminders.filter(r => r.type === '初一十五');
            const customReminders = todayReminders.filter(r => r.type === 'custom');
            
            let body = '';
            if (fruitReminders.length > 0) {
                body += fruitReminders.map(r => r.title).join('；');
            }
            if (customReminders.length > 0) {
                if (body) body += '\n';
                body += customReminders.map(r => r.title).join('；');
            }
            
            new Notification('农历提醒', {
                body: body,
                icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="45" fill="%23c43e4c"/%3E%3Ctext x="50" y="70" font-size="50" text-anchor="middle" fill="white" font-family="Arial"%3E🌙%3C/text%3E%3C/svg%3E'
            });
            
            localStorage.setItem(notifiedKey, 'true');
        },
        
        renderReminderList: function(reminders) {
            const list = this.dom.reminderList;
            
            if (reminders.length === 0) {
                list.innerHTML = '<li class="empty-reminder">暂无即将到来的提醒</li>';
                this.dom.reminderCount.textContent = '';
                return;
            }
            
            this.dom.reminderCount.textContent = `(${reminders.length})`;
            
            let html = '';
            reminders.forEach(r => {
                const month = r.date.getMonth() + 1;
                const day = r.date.getDate();
                const dateStr = `${month}月${day}日`;
                
                // 根据类型和提前天数显示不同图标
                let icon = '📌';
                if (r.type === '初一十五') {
                    if (r.daysBefore === 0) icon = '🙏';
                    else if (r.daysBefore === 1) icon = '⏰';
                    else icon = '📅';
                }
                
                html += `
                    <li class="reminder-item">
                        <div class="reminder-icon">${icon}</div>
                        <div class="reminder-content">
                            <div class="reminder-title">${r.title}</div>
                            <div class="reminder-meta">${r.lunarDay} · ${dateStr}</div>
                        </div>
                        <div class="reminder-days">${r.daysUntil === 0 ? '今天' : r.daysUntil + '天后'}</div>
                    </li>
                `;
            });
            
            list.innerHTML = html;
        },
        
        changeMonth: function(delta) {
            this.state.currentMonth += delta;
            
            if (this.state.currentMonth < 0) {
                this.state.currentMonth = 11;
                this.state.currentYear--;
            } else if (this.state.currentMonth > 11) {
                this.state.currentMonth = 0;
                this.state.currentYear++;
            }
            
            this.renderCalendar();
            this.updateReminders();
        },
        
        showToast: function(msg) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2000);
        },
        
        bindEvents: function() {
            this.dom.prevMonth.addEventListener('click', () => this.changeMonth(-1));
            this.dom.nextMonth.addEventListener('click', () => this.changeMonth(1));
            
            this.dom.defaultReminderContainer.addEventListener('click', () => this.toggleDefaultReminder());
            
            this.dom.menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                this.dom.menuDropdown.classList.toggle('show');
            });
            
            document.addEventListener('click', (e) => {
                if (!this.dom.menuBtn.contains(e.target) && !this.dom.menuDropdown.contains(e.target)) {
                    this.dom.menuDropdown.classList.remove('show');
                }
            });
            
            this.dom.enableNotification.addEventListener('click', () => {
                this.requestNotificationPermission();
            });
            
            this.dom.requestPermission.addEventListener('click', () => {
                this.requestNotificationPermission();
                this.dom.menuDropdown.classList.remove('show');
            });
            
            this.dom.showAddReminder.addEventListener('click', () => {
                this.openAddModal();
            });
            
            this.dom.addCustomReminder.addEventListener('click', () => {
                this.openAddModal();
                this.dom.menuDropdown.classList.remove('show');
            });
            
            this.dom.manageReminders.addEventListener('click', () => {
                this.openManageModal();
                this.dom.menuDropdown.classList.remove('show');
            });
            
            this.dom.closeAddModal.addEventListener('click', () => this.closeAddModal());
            this.dom.cancelAdd.addEventListener('click', () => this.closeAddModal());
            
            this.dom.closeManageModal.addEventListener('click', () => this.closeManageModal());
            this.dom.closeManage.addEventListener('click', () => this.closeManageModal());
            
            Array.from(this.dom.reminderType).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'lunar') {
                        this.dom.lunarMonthGroup.style.display = 'block';
                        this.dom.solarGroup.style.display = 'none';
                    } else {
                        this.dom.lunarMonthGroup.style.display = 'none';
                        this.dom.solarGroup.style.display = 'block';
                    }
                });
            });
            
            this.dom.saveReminder.addEventListener('click', () => this.saveCustomReminder());
            
            window.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) {
                    this.closeAddModal();
                    this.closeManageModal();
                }
            });
        },
        
        openAddModal: function() {
            document.querySelector('input[name="reminderType"][value="lunar"]').checked = true;
            this.dom.lunarMonthGroup.style.display = 'block';
            this.dom.solarGroup.style.display = 'none';
            this.dom.lunarMonth.value = '1';
            this.dom.reminderDay.value = '15';
            this.dom.isLeap.checked = false;
            this.dom.reminderTitle.value = '买水果';
            this.dom.daysBefore.value = '3';
            this.dom.repeatType.value = 'monthly';
            
            this.dom.addReminderModal.style.display = 'flex';
        },
        
        closeAddModal: function() {
            this.dom.addReminderModal.style.display = 'none';
        },
        
        openManageModal: function() {
            this.renderCustomReminders();
            this.dom.manageRemindersModal.style.display = 'flex';
        },
        
        closeManageModal: function() {
            this.dom.manageRemindersModal.style.display = 'none';
        },
        
        renderCustomReminders: function() {
            const list = this.dom.customRemindersList;
            
            if (this.state.customReminders.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#aa8c78; padding:20px;">暂无自定义提醒</div>';
                return;
            }
            
            let html = '';
            this.state.customReminders.forEach((reminder, index) => {
                const typeText = reminder.type === 'lunar' ? '农历' : '公历';
                let dateText = '';
                
                if (reminder.type === 'lunar') {
                    const monthNames = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '冬月', '腊月'];
                    dateText = `${monthNames[reminder.lunarMonth - 1]}${this.getLunarDayName(reminder.lunarDay)}${reminder.isLeap ? '(闰)' : ''}`;
                } else {
                    dateText = `${reminder.solarMonth}月${reminder.solarDay}日`;
                }
                
                html += `
                    <div class="custom-item">
                        <div class="custom-info">
                            <div class="custom-title">${reminder.title}</div>
                            <div class="custom-date">${typeText} ${dateText} · 提前${reminder.daysBefore}天</div>
                        </div>
                        <div class="custom-delete" data-index="${index}">🗑</div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
            
            list.querySelectorAll('.custom-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.target.dataset.index;
                    this.state.customReminders.splice(index, 1);
                    this.saveData();
                    this.renderCustomReminders();
                    this.renderCalendar();
                    this.updateReminders();
                    this.showToast('已删除');
                });
            });
        },
        
        getLunarDayName: function(day) {
            const names = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                         '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                         '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
            return names[day - 1] || day + '日';
        },
        
        saveCustomReminder: function() {
            const type = document.querySelector('input[name="reminderType"]:checked').value;
            
            let reminder = {
                id: Date.now(),
                type: type,
                title: this.dom.reminderTitle.value.trim() || '提醒',
                daysBefore: parseInt(this.dom.daysBefore.value) || 3,
                repeat: this.dom.repeatType.value
            };
            
            if (type === 'lunar') {
                reminder.lunarMonth = parseInt(this.dom.lunarMonth.value);
                reminder.lunarDay = parseInt(this.dom.reminderDay.value);
                reminder.isLeap = this.dom.isLeap.checked;
                
                if (reminder.lunarDay < 1 || reminder.lunarDay > 30) {
                    this.showToast('农历日期应为1-30');
                    return;
                }
            } else {
                if (!this.dom.solarDate.value) {
                    this.showToast('请选择公历日期');
                    return;
                }
                const [year, month, day] = this.dom.solarDate.value.split('-').map(Number);
                reminder.solarMonth = month;
                reminder.solarDay = day;
            }
            
            this.state.customReminders.push(reminder);
            this.saveData();
            this.closeAddModal();
            this.renderCalendar();
            this.updateReminders();
            this.showToast('✓ 提醒已添加');
        }
    };
    
    App.init();
})();
